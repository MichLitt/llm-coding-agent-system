- name: implement_async_job_queue
  task_id: custom_v8_010
  difficulty: hard
  description: >
    Implement async_jobs.py with an asyncio-based in-memory job queue.
    Required interface:
      - class AsyncJobQueue(max_workers=1, max_size=0)
      - async start()
      - async enqueue(job_id, func, *args, **kwargs)
      - async shutdown(wait=True)
      - get_job(job_id)
      - get_queue_size()
      - properties: is_running, processed_count
      - async create_job_queue(max_workers=1, max_size=0)
    Use the provided test_async_jobs.py as the source of truth and make all tests pass.
  setup_files:
    - test_async_jobs.py
  verification:
    - cmd: "python -m pytest test_async_jobs.py -v"
      expect_exit: 0
  max_steps: 20
