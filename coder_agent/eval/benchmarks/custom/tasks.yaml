# Custom Multi-step Task Suite for Coder-Agent Evaluation
# Covers easy / medium / hard difficulty, requiring diverse tool usage.
#
# Verification format:
#   - cmd: shell command to run in workspace
#     expect_exit: expected return code (0 = success)
#
# setup_files: files to copy from setup_files/ into workspace before the task

# =============================================================================
# EASY (3 tasks) - single file, focused operations
# =============================================================================

- name: debug_and_fix_sort
  task_id: custom_easy_001
  difficulty: easy
  description: >
    The file buggy_sort.py contains a bubble sort implementation with 3 bugs.
    Find and fix all bugs so that the tests in test_sort.py pass.
  setup_files:
    - buggy_sort.py
    - test_sort.py
  verification:
    - cmd: "python -m pytest test_sort.py -v"
      expect_exit: 0
  max_steps: 10

- name: write_fibonacci
  task_id: custom_easy_002
  difficulty: easy
  description: >
    Write a function `fibonacci(n)` in fibonacci.py that returns the n-th
    Fibonacci number (0-indexed: fibonacci(0)=0, fibonacci(1)=1, fibonacci(7)=13).
    Also write tests in test_fibonacci.py and ensure they all pass.
  setup_files: []
  verification:
    - cmd: "python -m pytest test_fibonacci.py -v"
      expect_exit: 0
  max_steps: 10

- name: add_type_hints
  task_id: custom_easy_003
  difficulty: easy
  description: >
    Read the file calculator.py and add proper Python type hints to all functions.
    The functions must still work correctly — run the existing tests to verify.
  setup_files:
    - calculator.py
    - test_calculator.py
  verification:
    - cmd: "python -m pytest test_calculator.py -v"
      expect_exit: 0
    - cmd: "python -c \"import ast, sys; ast.parse(open('calculator.py').read()); sys.exit(0)\""
      expect_exit: 0
  max_steps: 8

