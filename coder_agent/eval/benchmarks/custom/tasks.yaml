    Implement in old_config.py:
    1. migrate_config(old: dict) -> dict: convert flat dot-notation keys to nested dict.
       Type coercion: keys ending in "port", "pool_size", "ttl" -> int;
       keys ending in "debug", "enabled" -> bool ("true"/"false"); others -> str.
    2. load_config(path) -> ConfigV2: read YAML, auto-detect schema version:
       - v1 (flat string values) -> call migrate_config() then ConfigV2.from_dict()
       - v2 (nested dicts) -> call ConfigV2.from_dict() directly
       - Raise FileNotFoundError if file does not exist.

    OldConfig class must continue to work as before. All tests must pass.
