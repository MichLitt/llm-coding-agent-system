    Implement RateLimitMiddleware using the token-bucket algorithm:
    - Rate-limit per client IP address (environ["REMOTE_ADDR"])
    - rate: tokens refilled per second, capacity: max burst size
    - If tokens available: process request (deduct 1 token), return app response
    - If no tokens: return 429 Too Many Requests with a non-empty body
    - Thread-safe: multiple concurrent requests must not corrupt bucket state

