    The file leaky_cache.py contains EventCache, an event bus that stores history and
    notifies listeners. It has two memory problems:
    1. self._history grows without bound — no size limit
    2. self._listeners has no removal mechanism — callbacks accumulate forever

    Files provided: leaky_cache.py, test_memory.py (do NOT modify test file)

    Fix both issues:
    1. Bound _history to max_history entries (default 1000, set via __init__ param).
       Evict oldest entries first (FIFO). After emitting 50 events with max_history=10,
       history_size() must equal 10 (not 50).
    2. Add unsubscribe(callback) method so listeners can be removed.

    All tests in test_memory.py must pass, including the sustained-use bounded-memory test.
  setup_files:
    - leaky_cache.py
    - test_memory.py
  verification:
    - cmd: "python -m pytest test_memory.py -q --tb=short"
      expect_exit: 0
  max_steps: 15

