model:
  provider: minimax
  name: MiniMax-M2.7
  api_format: anthropic    # "openai" for M2.5, "anthropic" for M2.7
  temperature: 0.2
  max_tokens: 8192
  seed: 42

# Named LLM profiles — preferred over the legacy model: block above.
# Each profile declares transport (openai|anthropic), model name, and env var
# names for API key and base URL.  Set llm.default_profile to choose which
# profile is used when --llm-profile is not specified on the CLI.
llm:
  default_profile: minimax_m27

  profiles:
    minimax_m27:
      transport: anthropic
      model: MiniMax-M2.7
      api_key_env: LLM_MINIMAX_M27_API_KEY
      base_url_env: LLM_MINIMAX_M27_BASE_URL
      base_url_default: https://api.minimax.io/anthropic

    minimax_m25:
      transport: openai
      model: MiniMax-M2.5
      api_key_env: LLM_MINIMAX_M25_API_KEY
      base_url_env: LLM_MINIMAX_M25_BASE_URL

    glm_5:
      transport: openai
      model: glm-5.1
      api_key_env: LLM_GLM_5_API_KEY
      base_url_env: LLM_GLM_5_BASE_URL
      base_url_default: https://api.z.ai/api/coding/paas/v4

agent:
  max_steps: 15
  max_retries: 3
  planning_mode: react
  enable_memory: false     # `C4` enables project memory for multi-step tasks
  enable_checklist: false  # `C5` remains experimental/non-promoted in 0.4.0
  enable_approach_memory: true
  memory_lookup_mode: recency
  doom_loop_threshold: 2

tools:
  terminal_timeout: 30
  blocked_commands:
    - "rm -rf /"
    - "sudo"
    - ":(){:|:&};:"
    - "/dev/sda"
    - "mkfs"
    - "dd if="
    - "chmod -R 777 /"

context:
  max_tokens: 8000
  summary_threshold: 6000
  compression_strategy: rule_based  # rule_based / disabled
  observation_compression_mode: "off"
  history_compaction_mode: "rule_based"
  history_compaction_message_threshold: 20
  keep_recent_turns: 6

eval:
  output_dir: results/
  trajectory_dir: trajectories/
  random_seed: 42
