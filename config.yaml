model:
  provider: minimax
  name: MiniMax-M2.7
  api_format: anthropic    # "openai" for M2.5, "anthropic" for M2.7
  temperature: 0.2
  max_tokens: 8192
  seed: 42

agent:
  max_steps: 15
  max_retries: 3
  planning_mode: react
  enable_memory: false     # `C4` enables project memory for multi-step tasks
  enable_checklist: false  # `C5` remains experimental/non-promoted in 0.4.0

tools:
  terminal_timeout: 30
  blocked_commands:
    - "rm -rf /"
    - "sudo"
    - ":(){:|:&};:"
    - "/dev/sda"
    - "mkfs"
    - "dd if="
    - "chmod -R 777 /"

context:
  max_tokens: 8000
  summary_threshold: 6000
  compression_strategy: rule_based  # rule_based / disabled
  observation_compression_mode: "off"

eval:
  output_dir: results/
  trajectory_dir: trajectories/
  random_seed: 42
